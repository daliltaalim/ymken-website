<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Écosystème numérique YMKEN Solutions</title>
  <desc id="desc">Ville numérique cinématographique, intelligence artificielle, cloud et tableaux de bord reliés par des flux de données lumineux.</desc>
  <defs>
    <linearGradient id="sky" x1=".08" y1="0" x2=".9" y2="1"><stop stop-color="#010716"/><stop offset=".48" stop-color="#061b3e"/><stop offset="1" stop-color="#020b1c"/></linearGradient>
    <radialGradient id="atmosphere"><stop stop-color="#0caeff" stop-opacity=".34"/><stop offset=".45" stop-color="#075bc1" stop-opacity=".12"/><stop offset="1" stop-color="#00102a" stop-opacity="0"/></radialGradient>
    <radialGradient id="core"><stop stop-color="#fff"/><stop offset=".16" stop-color="#9cedff"/><stop offset=".48" stop-color="#087fff"/><stop offset="1" stop-color="#03245e" stop-opacity="0"/></radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#168fff" stop-opacity=".24"/><stop offset=".48" stop-color="#07356f" stop-opacity=".44"/><stop offset="1" stop-color="#020b20" stop-opacity=".82"/></linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#0a3c7e" stop-opacity=".48"/><stop offset="1" stop-color="#010613"/></linearGradient>
    <linearGradient id="cyan"><stop stop-color="#fff"/><stop offset=".25" stop-color="#5de8ff"/><stop offset="1" stop-color="#0676ff"/></linearGradient>
    <pattern id="microgrid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#45cfff" stroke-opacity=".09"/></pattern>
    <pattern id="windows" width="34" height="30" patternUnits="userSpaceOnUse"><rect x="7" y="7" width="5" height="9" rx="1" fill="#55dfff" opacity=".34"/><rect x="21" y="7" width="5" height="9" rx="1" fill="#168dff" opacity=".22"/></pattern>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="deepGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="200%"><feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000817" flood-opacity=".72"/></filter>
    <clipPath id="orbClip"><circle cx="816" cy="506" r="252"/></clipPath>
  </defs>

  <rect width="1600" height="1200" fill="url(#sky)"/>
  <rect width="1600" height="1200" fill="url(#microgrid)" opacity=".45"/>
  <ellipse cx="835" cy="490" rx="690" ry="560" fill="url(#atmosphere)"/>
  <g fill="#9eeaff">
